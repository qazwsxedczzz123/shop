<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黑貓本舖</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'PingFang TC', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .card {
      background: white; border-radius: 20px;
      padding: 28px 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin-bottom: 16px;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h1 { font-size: 22px; color: #1a1a2e; font-weight: 700; }
    .logo p { color: #888; font-size: 13px; margin-top: 4px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
    input[type="text"] {
      width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0;
      border-radius: 12px; font-size: 15px; outline: none; transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #ff6b35; }
    .btn-primary {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #ff6b35, #f7c59f);
      color: white; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    #result { display: none; }
    .result-header { text-align: center; margin-bottom: 20px; }
    .result-header .icon { font-size: 48px; }
    .result-header h2 { font-size: 20px; color: #1a1a2e; margin-top: 8px; }
    .result-header .sub { font-size: 13px; color: #888; margin-top: 4px; }
    .product-info {
      background: #fff8f5; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 16px; border-left: 4px solid #ff6b35;
    }
    .product-info .name { font-weight: 600; color: #1a1a2e; font-size: 14px; }
    .product-info .opt { color: #888; font-size: 13px; margin-top: 4px; }
    .section-title {
      font-size: 12px; color: #aaa; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .item-row {
      background: #f9f9f9; border-radius: 10px; padding: 12px 14px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
    }
    .item-label { font-size: 12px; color: #aaa; min-width: 56px; }
    .item-value { flex: 1; font-size: 14px; color: #1a1a2e; font-weight: 500; word-break: break-all; }
    .btn-copy {
      background: #ff6b35; color: white; border: none;
      border-radius: 8px; padding: 6px 14px; font-size: 12px;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-copy:active { background: #e55a28; }
    .btn-copy.copied { background: #4caf50; }
    .instructions-box {
      background: #f0f4ff; border-radius: 12px; padding: 16px; margin-top: 16px;
    }
    .instructions-box .i-title { font-size: 13px; color: #5c6bc0; font-weight: 700; margin-bottom: 10px; }
    .instructions-box .i-body { font-size: 13px; color: #444; line-height: 1.8; }
    .error-card {
      background: #fff5f5; border-radius: 12px; padding: 20px;
      text-align: center; border: 1px solid #ffcdd2;
    }
    .error-card .icon { font-size: 40px; }
    .error-card p { color: #c62828; margin-top: 12px; font-size: 14px; line-height: 1.6; }
    .notice-card {
      background: #fff9c4; border-radius: 12px; padding: 16px;
      border: 1px solid #f9e100; text-align: center;
    }
    .notice-card p { color: #7b6e00; font-size: 13px; line-height: 1.6; }
    .loading { text-align: center; padding: 20px; color: #888; font-size: 14px; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #eee;
      border-top-color: #ff6b35; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .already-badge {
      display: inline-block; background: #e8f5e9; color: #388e3c;
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      font-weight: 600; margin-top: 6px;
    }
    .btn-retry {
      background: none; border: 2px solid #ff6b35; color: #ff6b35;
      border-radius: 12px; padding: 12px; width: 100%;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 16px;
    }
    .btn-retry:active { background: #fff3ee; }
  </style>
</head>
<body>
<div class="container">
  <div class="card" id="searchCard">
    <div class="logo">
      <h1>🎁 自助領取系統</h1>
      <p>輸入訂單編號，立即取得您的商品</p>
    </div>
    <label for="orderId">訂單編號</label>
    <input type="text" id="orderId" placeholder="例：2505103D5FV47Q" />
    <button class="btn-primary" onclick="claimOrder()" id="claimBtn">領取商品</button>
  </div>
  <div id="result"></div>
</div>

<script>
  // ⚠️ 請換成您自己的 Apps Script Web App 網址
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKSptYkIiBvv7wO0vkhjj-Zb0sra1Xdj718KnbZuXBZnFYmt6TT3oB_lMKHdFzjHCU/exec';

async function claimOrder() {
  const orderId = document.getElementById('orderId').value.trim().replace(/^#/, '');
  if (!orderId) { alert('請輸入訂單編號'); return; }

  const btn = document.getElementById('claimBtn');
  btn.disabled = true;
  btn.textContent = '查詢中...';

  const r = document.getElementById('result');
  r.style.display = 'block';
  r.innerHTML = `<div class="card"><div class="loading"><div class="spinner"></div>處理中，請稍候...</div></div>`;

  // 取得買家 IP
  let buyerIP = '';
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    buyerIP = ipData.ip || '';
  } catch(e) {
    buyerIP = '無法取得';
  }

  // 清除上一次的 JSONP script tag
  const old = document.getElementById('jsonp-script');
  if (old) old.remove();

  window._jsonpCallback = function(data) {
    document.getElementById('jsonp-script').remove();
    document.getElementById('claimBtn').disabled = false;
    document.getElementById('claimBtn').textContent = '領取商品';
    showResult(data);
  };

  const script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = `${APPS_SCRIPT_URL}?action=getOrderInfo&orderId=${encodeURIComponent(orderId)}&ip=${encodeURIComponent(buyerIP)}&callback=_jsonpCallback`;
  script.onerror = function() {
    document.getElementById('claimBtn').disabled = false;
    document.getElementById('claimBtn').textContent = '領取商品';
    showError();
  };
  document.body.appendChild(script);
}
  
  function showResult(data) {
    const r = document.getElementById('result');

    if (!data.success) {
      const icon = data.isOutOfStock ? '📦' : data.isManual ? '🐱' : '❌';
      const boxClass = data.isManual ? 'notice-card' : 'error-card';
      r.innerHTML = `
        <div class="card">
          <div class="${boxClass}">
            <div class="icon">${icon}</div>
            <p>${data.message}</p>
          </div>
          <button class="btn-retry" onclick="resetForm()">重新查詢</button>
        </div>`;
      return;
    }

    let contentHTML = '';
    if (data.isEmailPass) {
  contentHTML = `<div class="section-title">帳號資訊</div>`;
  const contents = data.claimedContent;
  // 每兩個為一組（email, password）
  for (let i = 0; i < contents.length; i += 2) {
    const email    = contents[i]   || '';
    const password = contents[i+1] || '';
    const groupNum = contents.length > 2 ? ` ${i/2 + 1}` : ''; // 多組時顯示組別編號
    contentHTML += `
      <div class="item-row">
        <span class="item-label">📧 信箱${groupNum}</span>
        <span class="item-value" id="c${i}">${esc(email)}</span>
        <button class="btn-copy" onclick="cp('c${i}',this)">複製</button>
      </div>
      <div class="item-row">
        <span class="item-label">🔒 密碼${groupNum}</span>
        <span class="item-value" id="c${i+1}">${esc(password)}</span>
        <button class="btn-copy" onclick="cp('c${i+1}',this)">複製</button>
      </div>`;
  }
    } else {
      contentHTML = `<div class="section-title">序號</div>`;
      data.claimedContent.forEach((serial, i) => {
        contentHTML += `
          <div class="item-row">
            <span class="item-label">序號 ${i+1}</span>
            <span class="item-value" id="c${i}">${esc(serial)}</span>
            <button class="btn-copy" onclick="cp('c${i}',this)">複製</button>
          </div>`;
      });
    }

    const instrHTML = data.instructions ? `
  <div class="instructions-box">
    <div class="i-title">📋 使用說明</div>
    <div class="i-body">${linkify(data.instructions
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\r\n|\r|\n/g,'<br>'))}</div>
  </div>` : '';

    const badge = data.alreadyClaimed ? '<span class="already-badge">✓ 已領取過</span>' : '';

    r.innerHTML = `
      <div class="card">
        <div class="result-header">
          <div class="icon">${data.alreadyClaimed ? '📋' : '🎉'}</div>
          <h2>${data.alreadyClaimed ? '查詢成功' : '領取成功！'}</h2>
          ${badge}
        </div>
        <div class="product-info">
          <div class="name">${esc(data.productName)}</div>
          ${data.option ? `<div class="opt">選項：${esc(data.option)}</div>` : ''}
          <div class="opt">數量：${data.qty}</div>
        </div>
        ${contentHTML}
        ${instrHTML}
        <button class="btn-retry" onclick="resetForm()">查詢其他訂單</button>
      </div>`;
  }

  function showError() {
    document.getElementById('result').innerHTML = `
      <div class="card"><div class="error-card">
        <div class="icon">⚠️</div><p>系統發生錯誤，請稍後再試</p>
      </div></div>`;
  }

  function cp(id, btn) {
    navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => {
      btn.textContent = '已複製 ✓'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function resetForm() {
    document.getElementById('orderId').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('result').innerHTML = '';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function linkify(text) {
    return text.replace(
      /(https?:\/\/[^\s<>"]+)/g,
      '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:#5c6bc0;word-break:break-all;overflow-wrap:anywhere;">$1</a>'
    );
  }
</script>
</body>
</html>
